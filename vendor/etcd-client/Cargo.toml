[package]
name = "etcd-client"
version = "0.14.1"
authors = ["The etcd-client Authors <davidli2010@foxmail.com>"]
edition = "2021"
license = "MIT OR Apache-2.0"
description = "An etcd v3 API client (vendored, protox build)"

[features]
tls       = ["tonic/tls"]
tls-roots = ["tls", "tonic/tls-roots"]
pub-response-field = ["visible"]

[dependencies]
tonic        = "0.12.3"
prost        = "0.13"
tokio        = "1.38"
tokio-stream = "0.1"
tower-service = "0.3"
http         = "1.1"
visible      = { version = "0.0.1", optional = true }
tower        = { version = "0.4", default-features = false }

[build-dependencies]
# Use protox (pure Rust) instead of requiring an external protoc binary.
tonic-build = { version = "0.12.3", default-features = false, features = ["prost"] }
protox      = "0.7"
